<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크루 라이프보드 시스템 (Supabase 연동 완료본)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #fcfaf7; font-family: system-ui, -apple-system, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .theme-orange { color: #f26631; }
        .bg-theme-orange { background-color: #f26631; }
        .bg-theme-cream { background-color: #fff6f0; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-2 sm:p-4 md:p-6 text-slate-800">

    <div id="page-main-dashboard" class="w-full max-w-6xl view-page">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div>
                <h1 class="text-2xl font-black tracking-tight text-slate-900 flex items-center gap-2">
                    <span class="bg-theme-orange text-white px-2.5 py-0.5 rounded-xl text-sm font-bold">CREW</span> 
                    라이프보드 매니저
                </h1>
                <p class="text-xs text-slate-500 mt-1 font-medium">우리 크루원들의 실시간 자산, 식단, 목표 및 디데이 통합 관리 시스템</p>
            </div>
            <button onclick="openModal('modal-add-friend')" class="w-full sm:w-auto bg-slate-900 text-white text-xs font-bold px-4 py-2.5 rounded-xl hover:bg-slate-800 transition-all shadow-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-user-plus text-[10px]"></i> 새로운 크루 참여시키기 (+)
            </button>
        </div>

        <div id="crew-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-6"></div>
    </div>

    <div id="page-detail-space" class="w-full max-w-6xl view-page hidden">
        <div class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-2xl border border-slate-100 shadow-xs">
            <div class="flex items-center gap-3">
                <button onclick="goBackToDashboard()" class="w-8 h-8 rounded-xl bg-slate-50 hover:bg-slate-100 transition-all flex items-center justify-center text-slate-600 text-xs">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div>
                    <h2 id="detail-crew-name" class="text-lg font-extrabold text-slate-900">크루원 상세 로딩중...</h2>
                    <p class="text-[11px] text-slate-400 mt-0.5">이 사용자의 데이터베이스 레코드가 원격으로 실시간 동기화되고 있습니다.</p>
                </div>
            </div>
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <input type="date" id="global-date-picker" onchange="handleGlobalDateChange()" class="w-full sm:w-auto text-xs font-bold px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:outline-hidden focus:border-theme-orange">
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-start">
            <div class="lg:col-span-1 bg-white p-3 rounded-2xl border border-slate-100 shadow-xs flex flex-row lg:flex-col gap-1 overflow-x-auto no-scrollbar">
                <button id="btn-tab-study" onclick="switchDetailTab('tab-study')" class="w-full flex items-center gap-2 px-3 py-2.5 text-xs font-bold rounded-xl bg-theme-orange text-white text-left shadow-sm">
                    <i class="fa-solid fa-book-open"></i> 디데이 & 스터디 계획
                </button>
                <button id="btn-tab-diet" onclick="switchDetailTab('tab-diet')" class="w-full flex items-center gap-2 px-3 py-2.5 text-xs font-bold rounded-xl text-slate-300 text-left hover:bg-slate-50">
                    <i class="fa-solid fa-utensils"></i> 식단 기록 & 체중
                </button>
                <button id="btn-tab-schedule-etc" onclick="switchDetailTab('tab-schedule-etc')" class="w-full flex items-center gap-2 px-3 py-2.5 text-xs font-bold rounded-xl text-slate-300 text-left hover:bg-slate-50">
                    <i class="fa-solid fa-calendar-check"></i> 루틴 & 기타 스케줄
                </button>
                <button id="btn-tab-account" onclick="switchDetailTab('tab-account')" class="w-full flex items-center gap-2 px-3 py-2.5 text-xs font-bold rounded-xl text-slate-300 text-left hover:bg-slate-50">
                    <i class="fa-solid fa-wallet"></i> 가계부 자산 장부
                </button>
            </div>

            <div class="lg:col-span-3 space-y-6">
                <div id="tab-study" class="detail-tab-content space-y-6">
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs">
                        <h3 class="text-sm font-bold text-slate-900 mb-4 flex items-center gap-1.5"><i class="fa-solid fa-tags theme-orange"></i> 나의 시험 디데이 카테고리</h3>
                        <form onsubmit="addStudyCategoryMaster(event)" class="grid grid-cols-1 sm:grid-cols-3 gap-2 mb-4">
                            <input type="text" id="input-cate-name" placeholder="과목 또는 시험명 (예: 정보처리기사)" required class="sm:col-span-1 text-xs px-3 py-2 border border-slate-200 rounded-xl focus:outline-hidden">
                            <input type="date" id="input-cate-date" required class="sm:col-span-1 text-xs px-3 py-2 border border-slate-200 rounded-xl focus:outline-hidden">
                            <button type="submit" class="bg-theme-orange text-white text-xs font-bold px-4 py-2 rounded-xl">카테고리 개설</button>
                        </form>
                        <div id="study-category-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
                    </div>
                </div>

                <div id="tab-diet" class="detail-tab-content hidden space-y-6">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-xs">
                            <h4 class="text-xs font-bold text-slate-500 mb-2">아침 기상 몸무게 (AM)</h4>
                            <div class="flex gap-2">
                                <input type="number" step="0.1" id="input-weight-am" placeholder="0.0" class="w-full text-xs px-3 py-2 border border-slate-200 rounded-xl">
                                <button onclick="saveDietWeightsServer()" class="bg-slate-900 text-white text-xs font-bold px-4 py-2 rounded-xl whitespace-nowrap">저장</button>
                            </div>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-xs">
                            <h4 class="text-xs font-bold text-slate-500 mb-2">저녁 취침 몸무게 (PM)</h4>
                            <div class="flex gap-2">
                                <input type="number" step="0.1" id="input-weight-pm" placeholder="0.0" class="w-full text-xs px-3 py-2 border border-slate-200 rounded-xl">
                                <button onclick="saveDietWeightsServer()" class="bg-slate-900 text-white text-xs font-bold px-4 py-2 rounded-xl whitespace-nowrap">저장</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="tab-schedule-etc" class="detail-tab-content hidden space-y-6">
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs">
                        <h3 class="text-sm font-bold text-slate-900 mb-4"><i class="fa-solid fa-clock theme-orange"></i> 오늘의 일정/스케줄 타임라인</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="input-tab-todo-text" placeholder="일정 내용을 입력하세요." class="w-full text-xs px-3 py-2 border border-slate-200 rounded-xl focus:outline-hidden">
                            <button onclick="addScheduleItemMaster()" class="bg-slate-900 text-white text-xs font-bold px-5 py-2 rounded-xl whitespace-nowrap">추가</button>
                        </div>
                        <div id="schedule-tab-list" class="space-y-2"></div>
                    </div>
                </div>

                <div id="tab-account" class="detail-tab-content hidden space-y-6">
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs">
                        <h3 class="text-sm font-bold text-slate-900 mb-4"><i class="fa-solid fa-receipt theme-orange"></i> 오늘 일자 소비 지출 추가</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                            <input type="text" id="input-tab-acc-text" placeholder="지출 내역 내용" class="text-xs px-3 py-2 border border-slate-200 rounded-xl">
                            <input type="number" id="input-tab-acc-amount" placeholder="지출 금액 (원)" class="text-xs px-3 py-2 border border-slate-200 rounded-xl">
                            <button onclick="addAccountSpendFromTab()" class="bg-theme-orange text-white text-xs font-bold px-4 py-2 rounded-xl">기입 완료</button>
                        </div>
                        <div id="account-tab-spend-list" class="mt-4 space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-add-friend" class="fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white w-full max-w-sm rounded-2xl p-5 shadow-xl animate-in fade-in zoom-in-95 duration-150">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-extrabold text-sm text-slate-900">새로운 크루 생성 동기화</h3>
                <button onclick="closeModal('modal-add-friend')" class="text-slate-400 hover:text-slate-600 text-xs"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form onsubmit="handleCreateFriend(event)" class="space-y-3">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">크루 멤버 이름</label>
                    <input type="text" id="add-friend-name" placeholder="실명을 입력하세요" required class="w-full text-xs px-3 py-2.5 border border-slate-200 rounded-xl focus:outline-hidden focus:border-theme-orange bg-slate-50 font-medium">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">식별 패스코드 (비밀번호)</label>
                    <input type="password" id="add-friend-password" placeholder="4자리 숫자 권장" required class="w-full text-xs px-3 py-2.5 border border-slate-200 rounded-xl focus:outline-hidden focus:border-theme-orange bg-slate-50 font-medium">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeModal('modal-add-friend')" class="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold py-2.5 rounded-xl transition-all">취소</button>
                    <button type="submit" class="w-2/3 bg-theme-orange text-white text-xs font-bold py-2.5 rounded-xl hover:bg-[#d85323] transition-all shadow-sm">원격 데이터베이스 저장</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ⚠️ [중요] 변수 'supabase'는 파일 전역에서 단 한번만 선언되어야 오류가 발생하지 않습니다.
        const SUPABASE_URL = "https://cutuhrquajxdotyakhnoc.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1dWhycXVhanhkb3R5YWtobm9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjQxNzUsImV4cCI6MjA5NDY0MDE3NX0.OsJjaT1RtUMtgG0Za8kRzrEHpWBnPurAK7mvWy5s3KU";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 로컬 가상 오늘 날짜 기준 및 상태 제어 바인딩 모델 변수
        const TODAY_BASE_STR = "2026-05-19";
        let crewUsers = [];
        let cachedLifeLogs = [];
        let cachedStudyCategories = [];

        let currentActiveUserId = null;
        let currentSelectedDate = TODAY_BASE_STR;
        let activeTabId = 'tab-study';

        // 앱 구동 즉시 비동기 데이터 래치 연동 활성화
        window.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('global-date-picker').value = TODAY_BASE_STR;
            await refreshAllServerData();
            renderMainDashboard();
        });

        // 원격 서버로부터 상태 동기화 정합성 확보 패치 처리
        async function refreshAllServerData() {
            const resUsers = await supabase.from('crew_users').select('*').order('id', { ascending: true });
            if (!resUsers.error) crewUsers = resUsers.data || [];

            const resLogs = await supabase.from('daily_life_logs').select('*');
            if (!resLogs.error) cachedLifeLogs = resLogs.data || [];

            const resStudy = await supabase.from('study_categories').select('*');
            if (!resStudy.error) cachedStudyCategories = resStudy.data || [];
        }

        // 메인 대시보드 인터페이스 렌더러 구현부
        function renderMainDashboard() {
            const gridContainer = document.getElementById('crew-grid');
            gridContainer.innerHTML = '';

            crewUsers.forEach(user => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl border border-slate-100 shadow-xs hover:shadow-md transition-all cursor-pointer flex flex-col justify-between";
                card.onclick = () => openCrewDetailSpace(user.id);

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-xs font-black bg-theme-cream text-theme-orange px-2.5 py-1 rounded-lg">${user.name}</span>
                            <span class="text-[10px] text-slate-400 font-bold">ID: #${user.id}</span>
                        </div>
                        <div class="text-xs text-slate-600 space-y-1 font-medium">
                            <p><i class="fa-solid fa-wallet text-[10px] text-slate-400 mr-1"></i> 기본 자산: ${Number(user.base_asset || 0).toLocaleString()}원</p>
                            <p><i class="fa-solid fa-bullseye text-[10px] text-slate-400 mr-1"></i> 활성화 목표수: ${Array.isArray(user.goals) ? user.goals.length : 0}개</p>
                        </div>
                    </div>
                    <div class="mt-4 pt-3 border-t border-slate-50 flex justify-between items-center text-[11px] text-theme-orange font-bold">
                        <span>상세 라이프 장부 진입</span>
                        <i class="fa-solid fa-chevron-right text-[9px]"></i>
                    </div>
                `;
                gridContainer.appendChild(card);
            });
        }

        // 특정 크루 상세 공간 활성화 핸들러
        function openCrewDetailSpace(userId) {
            currentActiveUserId = userId;
            const targetUser = crewUsers.find(u => u.id === userId);
            if (!targetUser) return;

            document.getElementById('detail-crew-name').innerText = `${targetUser.name} 크루원의 라이프 대시보드`;
            document.getElementById('page-main-dashboard').classList.add('hidden');
            document.getElementById('page-detail-space').classList.remove('hidden');

            switchDetailTab(activeTabId);
        }

        function goBackToDashboard() {
            document.getElementById('page-detail-space').classList.add('hidden');
            document.getElementById('page-main-dashboard').classList.remove('hidden');
            currentActiveUserId = null;
        }

        function handleGlobalDateChange() {
            currentSelectedDate = document.getElementById('global-date-picker').value || TODAY_BASE_STR;
            switchDetailTab(activeTabId);
        }

        // 서브 탭 제어 전환 엔진 리팩토링
        function switchDetailTab(tabId) {
            activeTabId = tabId;
            document.querySelectorAll('.detail-tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');

            const tabButtons = ['tab-study', 'tab-diet', 'tab-schedule-etc', 'tab-account'];
            tabButtons.forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                if (!btn) return;
                if (t === tabId) {
                    btn.className = "w-full flex items-center gap-2 px-3 py-2.5 text-xs font-bold rounded-xl bg-theme-orange text-white text-left shadow-sm";
                } else {
                    btn.className = "w-full flex items-center gap-2 px-3 py-2.5 text-xs font-bold rounded-xl hover:bg-slate-50 transition-all text-slate-500 text-left";
                }
            });

            if (tabId === 'tab-study') loadStudyTabPlan();
            else if (tabId === 'tab-diet') loadDietTabAnalysis();
            else if (tabId === 'tab-schedule-etc') loadEtcScheduleTabMaster();
            else if (tabId === 'tab-account') loadAccountTabLedger();
        }

        // [신규 크루 등록] 회원가입 비동기 연동 처리
        async function handleCreateFriend(e) {
            e.preventDefault();
            const nameInput = document.getElementById('add-friend-name');
            const pwdInput = document.getElementById('add-friend-password');

            const { data, error } = await supabase.from('crew_users').insert([
                {
                    name: nameInput.value.trim(),
                    password: pwdInput.value,
                    goals: ["새로운 라이프 크루 목표 수립"],
                    base_asset: 0,
                    salaries: {}
                }
            ]).select();

            if (error) {
                alert("크루 등록 오류: " + error.message);
                return;
            }

            nameInput.value = ""; pwdInput.value = "";
            closeModal('modal-add-friend');
            await refreshAllServerData();
            renderMainDashboard();
        }

        // 탭 콘텐츠 로더 구현: 스터디 디데이 부문
        function loadStudyTabPlan() {
            const container = document.getElementById('study-category-list');
            container.innerHTML = '';

            const userCates = cachedStudyCategories.filter(c => c.user_id === currentActiveUserId);
            if (userCates.length === 0) {
                container.innerHTML = `<p class="text-slate-400 text-xs col-span-2 py-4 text-center font-medium">개설된 디데이 시험 과목 카테고리가 없습니다.</p>`;
                return;
            }

            userCates.forEach(cate => {
                const item = document.createElement('div');
                item.className = "bg-slate-50 p-4 rounded-xl border border-slate-100 flex justify-between items-center";
                
                const dDate = new Date(cate.exam_date);
                const bDate = new Date(currentSelectedDate);
                const diffTime = dDate - bDate;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                let dDayStr = diffDays === 0 ? "D-Day" : (diffDays > 0 ? `D-${diffDays}` : `D+${Math.abs(diffDays)}`);

                item.innerHTML = `
                    <div>
                        <h4 class="text-xs font-bold text-slate-800">${cate.name}</h4>
                        <p class="text-[10px] text-slate-400 font-medium mt-0.5">시험일자: ${cate.exam_date}</p>
                    </div>
                    <span class="text-xs font-black text-theme-orange bg-theme-cream px-2.5 py-1 rounded-lg">${dDayStr}</span>
                `;
                container.appendChild(item);
            });
        }

        async function addStudyCategoryMaster(e) {
            e.preventDefault();
            const nameIn = document.getElementById('input-cate-name');
            const dateIn = document.getElementById('input-cate-date');

            const { error } = await supabase.from('study_categories').insert([
                { user_id: currentActiveUserId, name: nameIn.value.trim(), exam_date: dateIn.value }
            ]);

            if (error) alert("서버 추가 실패: " + error.message);
            nameIn.value = ''; dateIn.value = '';
            await refreshAllServerData();
            loadStudyTabPlan();
        }

        // 탭 콘텐츠 로더 구현: 식단 정보 부문
        function loadDietTabAnalysis() {
            const dateStr = currentSelectedDate;
            const log = cachedLifeLogs.find(l => l.user_id === currentActiveUserId && l.log_date === dateStr);
            
            document.getElementById('input-weight-am').value = log ? log.diet_am_w || '' : '';
            document.getElementById('input-weight-pm').value = log ? log.diet_pm_w || '' : '';
        }

        async function saveDietWeightsServer() {
            const amVal = document.getElementById('input-weight-am').value;
            const pmVal = document.getElementById('input-weight-pm').value;
            const dateStr = currentSelectedDate;

            const existingLog = cachedLifeLogs.find(l => l.user_id === currentActiveUserId && l.log_date === dateStr);
            const payload = {
                id: existingLog ? existingLog.id : undefined,
                user_id: currentActiveUserId,
                log_date: dateStr,
                diet_am_w: amVal ? parseFloat(amVal) : null,
                diet_pm_w: pmVal ? parseFloat(pmVal) : null,
                meals: existingLog ? existingLog.meals : { morning: "", lunch: "", dinner: "" },
                workouts: existingLog ? existingLog.workouts : [],
                schedules: existingLog ? existingLog.schedules : [],
                spends: existingLog ? existingLog.spends : []
            };

            const { error } = await supabase.from('daily_life_logs').upsert(payload, { onConflict: 'user_id, log_date' });
            if (error) alert("서버 체중 저장 에러: " + error.message);
            
            await refreshAllServerData();
            alert("체중 원격 동기화가 완료되었습니다.");
        }

        // 탭 콘텐츠 로더 구현: 타임라인 및 스케줄 부문
        function loadEtcScheduleTabMaster() {
            const container = document.getElementById('schedule-tab-list');
            container.innerHTML = '';

            const dateStr = currentSelectedDate;
            const log = cachedLifeLogs.find(l => l.user_id === currentActiveUserId && l.log_date === dateStr);

            if (!log || !log.schedules || log.schedules.length === 0) {
                container.innerHTML = `<p class="text-slate-400 text-xs py-2 text-center font-medium">오늘 지정된 타임라인 일정이 존재하지 않습니다.</p>`;
                return;
            }

            log.schedules.forEach((sche, idx) => {
                const item = document.createElement('div');
                item.className = "bg-slate-50 px-3 py-2.5 rounded-xl border border-slate-100 flex justify-between items-center text-xs text-slate-700 font-medium";
                item.innerHTML = `
                    <span>${sche}</span>
                    <button onclick="deleteScheduleItemMaster(${idx})" class="text-slate-300 hover:text-rose-500 transition-all"><i class="fa-solid fa-trash-can"></i></button>
                `;
                container.appendChild(item);
            });
        }

        async function addScheduleItemMaster() {
            const input = document.getElementById('input-tab-todo-text');
            if (input.value.trim() === '') return;

            const dateStr = currentSelectedDate;
            const existingLog = cachedLifeLogs.find(l => l.user_id === currentActiveUserId && l.log_date === dateStr);
            let currentSchedules = existingLog && existingLog.schedules ? [...existingLog.schedules] : [];
            currentSchedules.push(input.value.trim());

            const payload = {
                id: existingLog ? existingLog.id : undefined,
                user_id: currentActiveUserId,
                log_date: dateStr,
                schedules: currentSchedules,
                meals: existingLog ? existingLog.meals : { morning: "", lunch: "", dinner: "" },
                workouts: existingLog ? existingLog.workouts : [],
                spends: existingLog ? existingLog.spends : []
            };

            const { error } = await supabase.from('daily_life_logs').upsert(payload, { onConflict: 'user_id, log_date' });
            if (error) alert("서버 스케줄 추가 에러: " + error.message);

            input.value = '';
            await refreshAllServerData();
            loadEtcScheduleTabMaster();
        }

        async function deleteScheduleItemMaster(idx) {
            const dateStr = currentSelectedDate;
            const log = cachedLifeLogs.find(l => l.user_id === currentActiveUserId && l.log_date === dateStr);
            if (!log || !log.schedules) return;

            log.schedules.splice(idx, 1);

            const { error } = await supabase.from('daily_life_logs').upsert(log, { onConflict: 'user_id, log_date' });
            if (error) alert("서버 변경사항 반영 실패: " + error.message);

            await refreshAllServerData();
            loadEtcScheduleTabMaster();
        }

        // 탭 콘텐츠 로더 구현: 가계부 자산 장부 부문
        function loadAccountTabLedger() {
            const container = document.getElementById('account-tab-spend-list');
            container.innerHTML = '';

            const dateStr = currentSelectedDate;
            const log = cachedLifeLogs.find(l => l.user_id === currentActiveUserId && l.log_date === dateStr);

            if (!log || !log.spends || log.spends.length === 0) {
                container.innerHTML = `<p class="text-slate-400 text-xs py-2 text-center font-medium">기입된 오늘 일자 지출 정보가 없습니다.</p>`;
                return;
            }

            log.spends.forEach((sp, idx) => {
                const item = document.createElement('div');
                item.className = "bg-slate-50 px-3 py-2.5 rounded-xl border border-slate-100 flex justify-between items-center text-xs font-medium text-slate-700";
                item.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="bg-rose-50 text-rose-500 font-bold px-1.5 py-0.5 rounded text-[10px]">지출</span>
                        <span>${sp.memo}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-bold text-slate-900">${Number(sp.cost || 0).toLocaleString()}원</span>
                        <button onclick="deleteAccountSpendFromTabMaster('${dateStr}', ${idx})" class="text-slate-300 hover:text-rose-500 transition-all"><i class="fa-solid fa-trash-can text-[11px]"></i></button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        async function addAccountSpendFromTab() {
            const tInput = document.getElementById('input-tab-acc-text');
            const aInput = document.getElementById('input-tab-acc-amount');

            if (tInput.value.trim() === "" || !aInput.value) return;

            const dateStr = currentSelectedDate;
            const existingLog = cachedLifeLogs.find(l => l.user_id === currentActiveUserId && l.log_date === dateStr);
            let currentSpends = existingLog && existingLog.spends ? [...existingLog.spends] : [];
            
            currentSpends.push({
                memo: tInput.value.trim(),
                cost: parseInt(aInput.value) || 0
            });

            const payload = {
                id: existingLog ? existingLog.id : undefined,
                user_id: currentActiveUserId,
                log_date: dateStr,
                spends: currentSpends,
                meals: existingLog ? existingLog.meals : { morning: "", lunch: "", dinner: "" },
                workouts: existingLog ? existingLog.workouts : [],
                schedules: existingLog ? existingLog.schedules : []
            };

            const { error } = await supabase.from('daily_life_logs').upsert(payload, { onConflict: 'user_id, log_date' });
            if (error) alert("가계부 동기화 실패: " + error.message);

            tInput.value = ""; aInput.value = "";
            await refreshAllServerData();
            loadAccountTabLedger();
        }

        async function deleteAccountSpendFromTabMaster(dateStr, idx) {
            const log = cachedLifeLogs.find(l => l.user_id === currentActiveUserId && l.log_date === dateStr);
            if (!log || !log.spends) return;

            log.spends.splice(idx, 1);

            const { error } = await supabase.from('daily_life_logs').upsert(log, { onConflict: 'user_id, log_date' });
            if (error) alert("서버 가계부 삭감 에러: " + error.message);

            await refreshAllServerData();
            loadAccountTabLedger();
        }

        // ==========================================\
        // 공통 UI 모달 헨들러 (기능 누락 방지 수정)
        // ==========================================\
        function openModal(id) {
            const modal = document.getElementById(id);
            if (modal) modal.classList.remove('hidden');
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            if (modal) modal.classList.add('hidden');
        }
    </script>
</body>
</html>
